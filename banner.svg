<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#a371f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="40" x2="900" y2="40" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="80" x2="900" y2="80" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#21262d" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#21262d" stroke-width="0.5"/>
  <line x1="180" y1="0" x2="180" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="540" y1="0" x2="540" y2="200" stroke="#21262d" stroke-width="0.5"/>
  <line x1="720" y1="0" x2="720" y2="200" stroke="#21262d" stroke-width="0.5"/>

  <!-- Glow circles -->
  <circle cx="820" cy="40" r="80" fill="#58a6ff" fill-opacity="0.05"/>
  <circle cx="80" cy="160" r="70" fill="#a371f7" fill-opacity="0.05"/>

  <!-- Accent line -->
  <rect x="0" y="196" width="900" height="2" fill="url(#line)" rx="1"/>

  <!-- Name -->
  <text x="60" y="88" font-family="'Segoe UI', -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e6edf3" letter-spacing="-1">Nikhil Korane</text>

  <!-- Role tags -->
  <!-- Quant badge -->
  <rect x="60" y="108" width="196" height="26" rx="5" fill="#e3b341" fill-opacity="0.12"/>
  <rect x="60" y="108" width="196" height="26" rx="5" fill="none" stroke="#e3b341" stroke-opacity="0.4" stroke-width="1"/>
  <text x="158" y="126" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#e3b341" text-anchor="middle" letter-spacing="0.8">QUANTITATIVE RESEARCHER</text>

  <!-- ML badge -->
  <rect x="266" y="108" width="134" height="26" rx="5" fill="#58a6ff" fill-opacity="0.12"/>
  <rect x="266" y="108" width="134" height="26" rx="5" fill="none" stroke="#58a6ff" stroke-opacity="0.4" stroke-width="1"/>
  <text x="333" y="126" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#58a6ff" text-anchor="middle" letter-spacing="0.8">ML ENGINEER</text>

  <!-- DS badge -->
  <rect x="410" y="108" width="128" height="26" rx="5" fill="#3fb950" fill-opacity="0.12"/>
  <rect x="410" y="108" width="128" height="26" rx="5" fill="none" stroke="#3fb950" stroke-opacity="0.4" stroke-width="1"/>
  <text x="474" y="126" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#3fb950" text-anchor="middle" letter-spacing="0.8">DATA SCIENTIST</text>

  <!-- Tagline -->
  <text x="60" y="162" font-family="'Segoe UI', sans-serif" font-size="13" fill="#8b949e" font-style="italic">Building rigorous, production-grade models at the intersection of statistical inference, ML &amp; quantitative finance.</text>

  <!-- Stats right side -->
  <text x="780" y="75" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#58a6ff" text-anchor="middle">10+</text>
  <text x="780" y="94" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1">YEARS EXP</text>

  <text x="780" y="130" font-family="'Segoe UI', sans-serif" font-size="30" font-weight="700" fill="#e3b341" text-anchor="middle">1M+</text>
  <text x="780" y="149" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8b949e" text-anchor="middle" letter-spacing="1">RECORDS @ 99.99%</text>

  <!-- Border -->
  <rect width="900" height="200" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>
